<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collage de Recuerdos</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: radial-gradient(circle at center, #001a12, #000);
    overflow-x: hidden;
    font-family: Arial, sans-serif;
    color: white;
    min-height: 100vh;
}

/* Fondo animado */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 20% 30%, rgba(255,255,0,0.08), transparent 20%),
        radial-gradient(circle at 80% 20%, rgba(0,255,100,0.08), transparent 20%),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,0.04), transparent 20%);
    animation: bgMove 10s linear infinite alternate;
    z-index: -2;
}

@keyframes bgMove {
    from {
        transform: scale(1) translateY(0px);
    }
    to {
        transform: scale(1.05) translateY(-10px);
    }
}

/* Partículas */
.particle {
    position: fixed;
    width: 3px;
    height: 3px;
    background: #b8ffb3;
    border-radius: 50%;
    opacity: .5;
    animation: float linear infinite;
    z-index: -1;
}

@keyframes float {
    from {
        transform: translateY(100vh);
        opacity: 0;
    }

    20% {
        opacity: 1;
    }

    to {
        transform: translateY(-10vh);
        opacity: 0;
    }
}

.title {
    text-align: center;
    padding: 40px 20px 10px;
    font-size: clamp(2rem, 5vw, 4rem);
    font-weight: bold;
    color: #fff3a3;
    text-shadow: 0 0 20px rgba(255,255,0,0.5);
}

.subtitle {
    text-align: center;
    opacity: .7;
    margin-bottom: 30px;
    padding: 0 20px;
}

/* GRID */
.gallery {
    width: min(1400px, 95%);
    margin: auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 20px;
    padding-bottom: 80px;
}

.card {
    position: relative;
    overflow: hidden;
    border-radius: 24px;
    cursor: pointer;
    opacity: 0;
    transform: translateY(50px) scale(.95);
    animation: reveal .8s forwards;
    box-shadow:
        0 10px 30px rgba(0,0,0,.5),
        0 0 20px rgba(255,255,0,.08);

    transition:
        transform .4s ease,
        box-shadow .4s ease;
}

.card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow:
        0 20px 50px rgba(0,0,0,.7),
        0 0 35px rgba(255,255,0,.25);
}

@keyframes reveal {
    to {
        opacity: 1;
        transform: translateY(0px) scale(1);
    }
}

.card img {
    width: 100%;
    height: 340px;
    object-fit: cover;
    display: block;
    transition: transform .5s ease;
}

.card:hover img {
    transform: scale(1.08);
}

.overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top,
        rgba(0,0,0,.85),
        rgba(0,0,0,.2),
        transparent);

    display: flex;
    align-items: end;
    padding: 20px;
}

.text {
    transform: translateY(20px);
    opacity: 0;
    transition: all .4s ease;
}

.card:hover .text {
    transform: translateY(0px);
    opacity: 1;
}

.text h3 {
    font-size: 1.3rem;
    margin-bottom: 8px;
    color: #fff7b0;
}

.text p {
    font-size: .95rem;
    line-height: 1.5;
    opacity: .9;
}

/* MODAL */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.9);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    visibility: hidden;
    transition: .4s ease;
    z-index: 100;
    padding: 20px;
}

.modal.active {
    opacity: 1;
    visibility: visible;
}

.modal-content {
    position: relative;
    width: min(900px, 100%);
    animation: zoom .4s ease;
}

@keyframes zoom {
    from {
        transform: scale(.7);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

.modal img {
    width: 100%;
    max-height: 75vh;
    object-fit: cover;
    border-radius: 24px;
    box-shadow: 0 0 40px rgba(255,255,0,.15);
}

.modal-text {
    margin-top: 20px;
    text-align: center;
}

.modal-text h2 {
    color: #fff4a0;
    margin-bottom: 10px;
    font-size: clamp(1.6rem, 3vw, 2.5rem);
}

.modal-text p {
    opacity: .9;
    line-height: 1.7;
    font-size: clamp(1rem, 2vw, 1.2rem);
}

.close {
    position: absolute;
    top: -15px;
    right: -15px;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: none;
    background: #ffe600;
    color: black;
    font-size: 1.5rem;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 0 20px rgba(255,255,0,.4);
}

/* Responsive */
@media(max-width:768px){

    .gallery {
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 14px;
    }

    .card img {
        height: 250px;
    }

    .text h3 {
        font-size: 1rem;
    }

    .text p {
        font-size: .8rem;
    }
}
</style>
</head>
<body>

<h1 class="title">Nuestros Recuerdos ✨</h1>
<p class="subtitle">💙 Cada foto guarda un momento bonito contigo 💚</p>

<div class="gallery" id="gallery"></div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-content">
        <button class="close" id="closeBtn">×</button>
        <img id="modalImg">

        <div class="modal-text">
            <h2 id="modalTitle"></h2>
            <p id="modalDesc"></p>
        </div>
    </div>
</div>

<script>
/* ✨ Partículas */
for(let i=0;i<50;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*100+'%';
    p.style.animationDuration=(5+Math.random()*8)+'s';
    p.style.animationDelay=Math.random()*5+'s';
    document.body.appendChild(p);
}

/* 💛 Textos bonitos */
const messages = [
    "Nuestro primer regalo como pareja.",
    "Recordando nuestro primer momento juntos.",
    "Aquí comenzó otro recuerdo bonito.",
    "Compartir tus pasiones es algo que más amo.",
    "Momentos simples que significan todo donde construiremos nuevas historias.",
    "Desahogarnos y pasar momentos tan cagados xd.",
    "Nostros pronto mi niña hermosa.",
    "Iré llenando estos espacios siempre.",
    "Iré llenando estos espacios siempre.",
    "Iré llenando estos espacios siempre.",
    "Iré llenando estos espacios siempre.",
    "Iré llenando estos espacios siempre.",
    "Iré llenando estos espacios siempre.",
    "Iré llenando estos espacios siempre.",
    "Iré llenando estos espacios siempre.",
    "Iré llenando estos espacios siempre.",
    "Iré llenando estos espacios siempre.",
    "Iré llenando estos espacios siempre.",
    "Iré llenando estos espacios siempre.",
    "Iré llenando estos espacios siempre."
];

const gallery = document.getElementById('gallery');

/* 📸 Crear imágenes dinámicamente */
for(let i=1;i<=20;i++){

    const num = String(i).padStart(2,'0');

    const card = document.createElement('div');
    card.className='card';
    card.style.animationDelay = `${i * 0.12}s`;

    card.innerHTML=`
        <img src="img/img_${num}.png" alt="foto ${num}">

        <div class="overlay">
            <div class="text">
                <h3>Recuerdo ${num}</h3>
                <p>${messages[i-1]}</p>
            </div>
        </div>
    `;

    card.addEventListener('click', ()=>{
        openModal(`img/img_${num}.png`, `Recuerdo ${num}`, messages[i-1]);
    });

    gallery.appendChild(card);
}

/* 🖼️ Modal */
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');
const modalTitle = document.getElementById('modalTitle');
const modalDesc = document.getElementById('modalDesc');

function openModal(src, title, desc){
    modal.classList.add('active');
    modalImg.src = src;
    modalTitle.textContent = title;
    modalDesc.textContent = desc;
}

function closeModal(){
    modal.classList.remove('active');
}

closeBtn.addEventListener('click', closeModal);

modal.addEventListener('click', (e)=>{
    if(e.target === modal){
        closeModal();
    }
});
</script>

</body>
</html>
